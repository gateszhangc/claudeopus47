apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claudeopus47
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: claudeopus47
  source:
    repoURL: https://github.com/gateszhangc/claudeopus47.git
    targetRevision: main
    path: deploy/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: claudeopus47
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
