apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claudeopus47-live-www-redirect
  labels:
    app.kubernetes.io/name: claudeopus47
    app.kubernetes.io/part-of: claudeopus47
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/permanent-redirect: https://claudeopus47.lol
    nginx.ingress.kubernetes.io/permanent-redirect-code: "308"
spec:
  ingressClassName: nginx
  rules:
    - host: www.claudeopus47.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claudeopus47
                port:
                  number: 80
  tls:
    - hosts:
        - www.claudeopus47.lol
      secretName: claudeopus47-live-tls
