apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claudeopus47-live
  labels:
    app.kubernetes.io/name: claudeopus47
    app.kubernetes.io/part-of: claudeopus47
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/issue-temporary-certificate: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: claudeopus47.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claudeopus47
                port:
                  number: 80
  tls:
    - hosts:
        - claudeopus47.lol
        - www.claudeopus47.lol
      secretName: claudeopus47-live-tls
