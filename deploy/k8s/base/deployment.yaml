apiVersion: apps/v1
kind: Deployment
metadata:
  name: claudeopus47
  labels:
    app.kubernetes.io/name: claudeopus47
    app.kubernetes.io/part-of: claudeopus47
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: claudeopus47
      app.kubernetes.io/part-of: claudeopus47
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claudeopus47
        app.kubernetes.io/part-of: claudeopus47
    spec:
      imagePullSecrets:
        - name: claudeopus47-registry
      containers:
        - name: web
          image: registry.144.91.77.245.sslip.io/claudeopus47:bootstrap
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
